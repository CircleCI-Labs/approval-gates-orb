---
description: >
  Approval gate validation on a Windows executor. The orb automatically
  detects the platform and installs dependencies as needed.
usage:
  version: 2.1
  orbs:
    approval-gates: circleci-labs/approval-gates@1.0.0
  jobs:
    deploy-to-prod:
      executor: approval-gates/windows
      steps:
        - approval-gates/validate_approver
        - run:
            name: Deploy to production
            shell: powershell.exe
            command: Write-Host "Deploying..."
  workflows:
    build-approve-deploy:
      jobs:
        - build
        - approve-deploy:
            type: approval
            requires:
              - build
        - deploy-to-prod:
            context:
              - deployment-approvers
              - circleci-api
            requires:
              - approve-deploy

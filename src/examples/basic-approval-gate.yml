description: >
  Basic approval gate pattern. The validate_approver command runs as
  the first step in the deploy job, blocking unauthorized approvers.
  Requires two contexts: one with CIRCLECI_API_TOKEN and one with
  AUTHORIZED_APPROVERS.
usage:
  version: 2.1
  orbs:
    approval-gates: cci-labs/approval-gates@1.0.0
  jobs:
    deploy-to-prod:
      docker:
        - image: cimg/base:current
      steps:
        - approval-gates/validate_approver
        - run:
            name: Deploy to production
            command: echo "Deploying..."
  workflows:
    build-approve-deploy:
      jobs:
        - build
        - approve-deploy:
            type: approval
            requires:
              - build
        - deploy-to-prod:
            context:
              - deployment-approvers
              - circleci-api
            requires:
              - approve-deploy

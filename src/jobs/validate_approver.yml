---
description: >
  Validates that the user who approved an upstream approval job is
  authorized. Use this as a standalone job in your workflow between
  the approval gate and your deployment job, or use the
  validate_approver command directly as a step inside your deploy job.
parameters:
  api-token:
    type: env_var_name
    default: CIRCLECI_API_TOKEN
    description: >
      Name of the environment variable containing a CircleCI API token
      with read access.
  authorized-approvers:
    type: env_var_name
    default: AUTHORIZED_APPROVERS
    description: >
      Name of the environment variable containing a comma-separated
      list of authorized approver logins.
  approval-job-name:
    type: string
    default: ""
    description: >
      Name of the specific approval job to check. If empty, the first
      successful approval-type job in the workflow is used.
  executor:
    type: executor
    default: default
    description: >
      Executor to run the validation on. Defaults to the orb's
      Linux Docker executor. Use the windows executor for
      Windows-based pipelines.
executor: << parameters.executor >>
steps:
  - validate_approver:
      api-token: << parameters.api-token >>
      authorized-approvers: << parameters.authorized-approvers >>
      approval-job-name: << parameters.approval-job-name >>
